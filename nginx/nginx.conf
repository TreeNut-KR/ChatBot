#되는 최신버전 
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html index.htm;

        # 정적 파일 처리
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Naver 로그인 페이지 처리
        location /naverLogin {
            root /usr/share/nginx/html;
            try_files /naverLogin.html =404;
            add_header Content-Type text/html;
        }

        # Google 로그인 페이지 처리
        location /googleLogin {
            root /usr/share/nginx/html;  # 정적 파일로 서빙
            try_files /googleLogin.html =404;
            add_header Content-Type text/html;  # HTML 파일로 반환
        }

        # FastAPI 프록시 설정
        location /sub {
            proxy_pass http://fastapi:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Spring Boot 프록시 설정
        location /server {
            proxy_pass http://springboot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 프록시 설정 (/api/auth/google)
        location /api {
            proxy_pass http://springboot:8080;  # Spring Boot 서버로 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS 헤더 추가
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";

            # OPTIONS 요청 처리
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}

